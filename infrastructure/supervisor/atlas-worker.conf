; Atlas queue workers — Supervisor configuration
; Five named queues, each processed by a dedicated worker group.
; Adjust numprocs based on available CPU and expected throughput.

[program:atlas-worker-high]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/atlas/backend/artisan queue:work high --sleep=1 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/atlas/worker-high.log
stopwaitsecs=60

